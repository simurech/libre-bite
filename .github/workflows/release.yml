name: Build & Release ZIP

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Create Plugin ZIP
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build Clean ZIP
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          mkdir -p build/libre-bite

          rsync -a ./ build/libre-bite/ \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='.gitignore' \
            --exclude='.gitkeep' \
            --exclude='.DS_Store' \
            --exclude='build' \
            --exclude='*.zip' \
            --exclude='node_modules' \
            --exclude='assets/wp-org'

          cd build
          zip -r "../libre-bite-${VERSION}.zip" libre-bite/
          echo "ASSET_NAME=libre-bite-${VERSION}.zip" >> "$GITHUB_ENV"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ASSET_NAME }}
          generate_release_notes: true
          make_latest: true